# CI (PADR-0002/0004/0010/0011). Jobs invoke the same make targets developers use,
# so pipeline and docs can't drift. The test matrix covers both ends of the
# supported PostgreSQL and Django ranges.

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: make lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: make typecheck

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        postgres: ["12", "17"]
        django: ["~=4.2.0", "~=5.2.0"]
        exclude:
          # Django 5.2 requires PostgreSQL >= 14; the PG 12 floor (ADR-0002)
          # is exercised on the Django 4.2 floor lane.
          - postgres: "12"
            django: "~=5.2.0"
    services:
      postgres:
        image: postgres:${{ matrix.postgres }}-alpine
        env:
          POSTGRES_USER: django_assets
          POSTGRES_PASSWORD: django_assets
          POSTGRES_DB: django_assets_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U django_assets"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --frozen
      - name: Pin Django for this matrix lane
        run: uv pip install "Django${{ matrix.django }}"
      - run: make ci-test
        env:
          POSTGRES_HOST: 127.0.0.1
          # uv run would otherwise re-sync to the lockfile, undoing the pin.
          UV_NO_SYNC: "1"

  ddl-modes:
    # ADR-0004 verification: hybrid migrate == external .sql apply,
    # install_ledger_ddl idempotency, and the --no-migrations lane where
    # the post_migrate handler is the only installer.
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: django_assets
          POSTGRES_PASSWORD: django_assets
          POSTGRES_DB: django_assets_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U django_assets"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: make ddl-verify
        env:
          POSTGRES_HOST: 127.0.0.1

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: make build
      - name: Wheel sanity (package + py.typed present)
        run: unzip -l dist/*.whl | grep -q "django_assets/py.typed"
