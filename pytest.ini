[pytest]
DJANGO_SETTINGS_MODULE = dev_project.settings.test
python_files = tests.py test_*.py *_tests.py
; --reuse-db: run `make test-create-db` after migration changes (PADR-0004).
; NOTE: --nomigrations is deliberately absent (PADR-0002): the balance trigger,
; domains, and all integrity DDL live in migrations and must exist in test DBs.
addopts = --reuse-db
django_debug_mode = true
