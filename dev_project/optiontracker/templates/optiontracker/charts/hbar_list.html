{% load tracker_format %}
{# Chart include — ALLOWED arithmetic zone (bar widths from tracker_charts). #}
<div class="hbar-list">
  {% for item in items %}
  <div class="hbar-row">
    <span class="hbar-label">{{ item.slug|strategy_label }}</span>
    <span class="hbar-track"><span class="hbar-fill" style="width: {{ item.width|floatformat:'1' }}%"></span></span>
    <span class="hbar-count">{{ item.count }}</span>
  </div>
  {% empty %}
  <p class="empty-row">No closed strategies in the selected window.</p>
  {% endfor %}
</div>
