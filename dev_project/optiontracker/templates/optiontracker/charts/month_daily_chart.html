{% load tracker_format %}
{# Chart include — ALLOWED arithmetic zone (pixel geometry from tracker_charts). #}
<svg class="chart month-daily-chart" viewBox="0 0 {{ width }} {{ height }}" role="img" aria-label="Daily PnL bar chart">
  {% if empty %}
  <text class="tick-label" x="50%" y="50%" text-anchor="middle">No daily PnL this month</text>
  {% else %}
  {% for tick in ticks %}
  <line class="gridline" x1="{{ pad_left }}" x2="{{ plot_right }}" y1="{{ tick.y }}" y2="{{ tick.y }}"/>
  <text class="tick-label" x="{{ tick_x }}" y="{{ tick.y }}" text-anchor="end" dominant-baseline="middle">{{ tick.label }}</text>
  {% endfor %}
  <line class="axis-zero" x1="{{ pad_left }}" x2="{{ plot_right }}" y1="{{ zero_y }}" y2="{{ zero_y }}"/>
  {% for bar in bars %}
  <rect class="bar {% if bar.negative %}bar-neg{% else %}bar-pos{% endif %}" x="{{ bar.x }}" y="{{ bar.y }}" width="{{ bar.w }}" height="{{ bar.h }}" rx="1.5">
    <title>{{ bar.date|date:"M j" }}: {{ bar.amount|money }}</title>
  </rect>
  {% endfor %}
  {% for tick in x_ticks %}
  <text class="tick-label" x="{{ tick.x }}" y="{{ label_y }}" text-anchor="middle">{{ tick.label }}</text>
  {% endfor %}
  {% endif %}
</svg>
