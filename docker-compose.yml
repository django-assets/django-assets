# Local dev services (PADR-0004, PADR-0011).
# `make up` starts postgres for the host-native loop; the `app` service is the
# dev container (CI-parity reference environment; .devcontainer targets it).

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: django_assets
      POSTGRES_PASSWORD: django_assets
      POSTGRES_DB: django_assets_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U django_assets"]
      interval: 1s
      timeout: 5s
      retries: 30

  app:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    working_dir: /workspace
    command: sleep infinity
    init: true
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      # Keep the venv and caches off the macOS bind mount (PADR-0011).
      UV_PROJECT_ENVIRONMENT: /venv
      UV_CACHE_DIR: /uv-cache
    volumes:
      - .:/workspace
      - venv:/venv
      - uv-cache:/uv-cache

volumes:
  venv:
  uv-cache:
